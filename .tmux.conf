unbind r
bind r source-file ~/.tmux.conf

# set -g prefix C-a
set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Split vertically (side-by-side) with 'v'
bind v split-window -h -c "#{pane_current_path}"
# Split horizontally (stacked) with 'h'
bind h split-window -v -c "#{pane_current_path}"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g status-style "bg=default,fg=white"

# 1. ROUNDED LEFT SIDE CAP
set -g status-left-length 30
set -g status-left "#[fg=magenta,bg=default]#[fg=black,bg=magenta,bold]tmux#[fg=magenta,bg=default] "

# 2. LOCAL MAC PROFILE (Clean and streamlined)
set -g status-right-length 120
set -g status-right "#[fg=cyan,bg=default]#[fg=black,bg=cyan]#(whoami)@#H#[fg=cyan,bg=default] #[fg=green,bg=default]#[fg=black,bg=green]%Y-%m-%d %H:%M#[fg=green,bg=default]"

# 3. REMOTE VPS OVERRIDE (System stats only, no flaky IP parsing commands)
if-shell '[[ $(uname -s) = "Linux" ]]' {
    set -g status-right-length 180
    set -g status-right "#[fg=cyan,bg=default]#[fg=black,bg=cyan]#(whoami)@#H#[fg=cyan,bg=default] #[fg=yellow,bg=default]#[fg=black,bg=yellow]   #(top -bn1 | grep 'Cpu(s)' | sed 's/.*, *\\([0-9.]*\\)%* id.*/\\1/' | awk '{print 100 - $1\"%\"}')#[fg=yellow,bg=default] #[fg=magenta,bg=default]#[fg=black,bg=magenta]   #(free -h | awk '/^Mem:/ {print $3\"/\"$2}')#[fg=magenta,bg=default] #[fg=green,bg=default]#[fg=black,bg=green]%Y-%m-%d %H:%M#[fg=green,bg=default]"
}
