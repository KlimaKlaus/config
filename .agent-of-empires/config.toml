[theme]
name = "empire"
color_mode = "truecolor"
idle_decay_minutes = 0

[claude]

[updates]
check_enabled = true
check_interval_hours = 24
notify_in_cli = true

[worktree]
enabled = true
path_template = "../{repo-name}-worktrees/{branch}"
bare_repo_path_template = "./{branch}"
auto_cleanup = true
show_branch_in_tui = true
delete_branch_on_cleanup = false
workspace_path_template = "../{branch}-workspace-{session-id}"

[sandbox]
enabled_by_default = true
default_image = "ghcr.io/njbrake/aoe-sandbox:latest"
extra_volumes = [
    "/Users/lucasfreytorreshanson/Desktop/code/config/opencode/agent:/root/.opencode/agent",
    "/Users/lucasfreytorreshanson/Desktop/code/config/opencode/skills:/root/.opencode/skills",
    "/Users/lucasfreytorreshanson/Desktop/code/config/opencode/opencode.jsonc:/root/.opencode/opencode.jsonc",
    "/Users/lucasfreytorreshanson/Desktop/code/config/.pi:/root/.pi",
    "/Users/lucasfreytorreshanson/Desktop/code/config/.multica:/root/.multica",
]
environment = [
    "TERM",
    "COLORTERM",
    "FORCE_COLOR",
    "NO_COLOR",
    "OPENCODE_CONFIG=/root/.opencode/opencode.jsonc",
    "PI_CONFIG=/root/.pi/agent/settings.json",
]
auto_cleanup = true
cpu_limit = "4"
memory_limit = "512m"
default_terminal_mode = "host"
volume_ignores = []
mount_ssh = false
container_runtime = "docker"

[tmux]
status_bar = "auto"
mouse = "auto"
clipboard = "auto"

[session]
yolo_mode_default = true
agent_status_hooks = false
strict_hotkeys = false

[diff]
context_lines = 3

[hooks]

[sound]
enabled = false
mode = "random"

[app_state]
has_seen_welcome = true
last_seen_version = "1.6.1"
has_seen_custom_instruction_warning = false
has_acknowledged_agent_hooks = false
group_by = "project"

[web]
notifications_enabled = true
notify_on_waiting = true
notify_on_idle = true
notify_on_error = true

[cockpit]
enabled = false
default_for_claude = true
default_agent = "aoe-agent"
max_concurrent_workers = 5
replay_events = 500
replay_bytes = 5242880
node_path = ""
