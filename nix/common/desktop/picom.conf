# ── Picom compositor (Catppuccin-friendly) ─────────────────────
# Lightweight compositor for transparency, shadows, fade effects

backend = "xrender";

# ── Shadows ────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.6;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

# ── Fading ─────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# ── Transparency / Opacity ─────────────────────────────────────
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 0.95;
inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'wezterm' && focused",
  "85:class_g = 'wezterm' && !focused"
];

# ── Window type settings ───────────────────────────────────────
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; };
  dock = { shadow = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
  dropdown_menu = { opacity = 0.95; };
};

# ── VSync / misc ───────────────────────────────────────────────
vsync = true;
unredir-if-possible = true;
detect-client-opacity = true;
